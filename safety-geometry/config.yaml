model:
  name: "llava-hf/llava-1.5-7b-hf"
  device: "cuda"
  dtype: "float16"

extraction:
  pooling: "mean"           # "last" (last token) | "mean" (all tokens)
  batch_size: 4             # LLaVA-1.5-7b needs ~14GB VRAM; reduce if OOM
  layers: null              # null = all 33 layers (0=embed, 1-32=transformer)

data:
  pku_saferlhf:
    path: "data/pku_saferlhf"
    n_samples: 500          # per class
    text_col: "prompt"
    response_col: "response_0"
    label_col: "is_response_0_safe"
  visual_harm:
    path: "data/visual_harm"
    n_samples: 200
    image_col: "image_path"
    label_col: "label"      # 1=safe, 0=harmful
    # question shown to the model alongside each image
    prompt_template: "What is shown in this image?"

analysis:
  n_safety_layers: 5        # top-k layers by linear probe accuracy
  n_pls_components: 5       # PLS components (first component = safety direction)
  boundary_threshold: 0.35  # |score| < threshold → boundary sample

output:
  dir: "outputs"
  save_states: true         # cache hidden states as .npy for --skip-extract
